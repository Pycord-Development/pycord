name: Enforce PR Template

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to validate'
        required: true
        type: number

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  enforce-template:
    runs-on: ubuntu-latest

    steps:
      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Load PR details
        id: load_pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('author', pr.user.login);
            core.setOutput('body', pr.body || '');
            core.setOutput('state', pr.state);
            core.setOutput('number', pr.number.toString());

      - name: Check if author is org member
        id: org_check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const org = 'Pycord-Development';
            const username = '${{ steps.load_pr.outputs.author }}';

            try {
              await github.rest.orgs.checkMembershipForUser({
                org,
                username,
              });
              core.setOutput('is_member', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('is_member', 'false');
              } else {
                throw error;
              }
            }

      - name: Skip enforcement for org members
        if: steps.org_check.outputs.is_member == 'true'
        run: echo "Author is org member; skipping template enforcement."

      - name: Validate PR body against template
        if: steps.org_check.outputs.is_member == 'false'
        id: validate
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = (`${{ steps.load_pr.outputs.body }}` || '').trim();

            const problems = [];

            // Basic length check – adjust as desired
            if (body.length < 150) {
              problems.push('PR description is too short (expected more content based on the template).');
            }

            // Required headings from PULL_REQUEST_TEMPLATE.md
            const requiredHeadings = [
              '## Summary',
              '## Information',
              '## Checklist',
            ];

            for (const heading of requiredHeadings) {
              if (!body.includes(heading)) {
                problems.push(`Missing required section: "${heading}"`);
              }
            }

            // Enforce AI disclosure line
            if (!body.includes('AI Usage has been disclosed')) {
              problems.push('The line "AI Usage has been disclosed." is missing.');
            }

            if (problems.length > 0) {
              core.setOutput('valid', 'false');
              core.setOutput('problems', problems.join('\n'));
            } else {
              core.setOutput('valid', 'true');
            }

      - name: Handle invalid PR
        if: steps.org_check.outputs.is_member == 'false' && steps.validate.outputs.valid == 'false'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ steps.load_pr.outputs.number }}');
            const problems = `${{ steps.validate.outputs.problems }}`;
            const prState = '${{ steps.load_pr.outputs.state }}';

            const INVALID_LABEL = 'invalid';

            // 1) Add 'invalid' label if not present
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const existingLabels = (pr.labels || []).map(l => l.name);
            if (!existingLabels.includes(INVALID_LABEL)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [INVALID_LABEL],
              });
            }

            // 2) Comment with reason
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                'This pull request does not follow the required pull request template.',
                '',
                'Please use the default template (`PULL_REQUEST_TEMPLATE.md`) and fill out all required sections.',
                '',
                'Problems detected:',
                '',
                '```',
                problems,
                '```',
              ].join('\n'),
            });

            // 3) Close PR if it is still open
            if (prState === 'open') {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed',
              });
            }

            core.setFailed('PR does not follow the required template.');

      - name: Validation passed
        if: steps.org_check.outputs.is_member == 'false' && steps.validate.outputs.valid == 'true'
        run: echo "PR template validation passed for non-org member."
